version: '3.9'

services:
  backend:
    build:
      context: ./escrow-service
      dockerfile: Dockerfile
    container_name: escrow-backend
    restart: unless-stopped
    # No ports exposed — backend is internal only, accessed via Next.js rewrites
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3001}
      CORS_ORIGIN: ${FRONTEND_URL:-http://localhost:3001}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      DB_PATH: /app/data/db.sqlite
    volumes:
      - escrow_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${FRONTEND_URL:-http://localhost:3001}
    container_name: escrow-frontend
    restart: unless-stopped
    expose:
      - "3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      BACKEND_URL: http://backend:3000
    depends_on:
      backend:
        condition: service_healthy
    labels:
      - traefik.enable=true
      - traefik.http.routers.escrow-frontend.rule=Host(`escrow.dhruvautomates.in`)
      - traefik.http.routers.escrow-frontend.entrypoints=https
      - traefik.http.routers.escrow-frontend.tls=true
      - traefik.http.services.escrow-frontend.loadbalancer.server.port=3001
    networks:
      - default
      - coolify

volumes:
  escrow_data:
    driver: local

networks:
  coolify:
    external: true
